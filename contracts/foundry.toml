[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1_000
via_ir = true
bytecode_hash = "none"
ffi = false
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Deployment/verification metadata for GIWA Sepolia (Blockscout).
[profile.default.fuzz]
runs = 512
max_test_rejects = 100_000

[profile.default.invariant]
runs = 256
depth = 32
fail_on_revert = false

[rpc_endpoints]
giwa_sepolia = "${GIWA_RPC_URL}"

[etherscan]
giwa_sepolia = { key = "${EXPLORER_API_KEY}", url = "https://sepolia-explorer.giwa.io/api", chain = 91342 }
